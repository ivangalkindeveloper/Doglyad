version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8001"
    volumes:
      - ../config:/app/config:ro
    environment:
      RUN_MODE: ${RUN_MODE:-stub}
      VLLM_URL: ${VLLM_URL:-http://vllm:8001}

  vllm:
    image: vllm/vllm-openai:latest
    command: ["--model", "google/medgemma-27b-it"]
    ports:
      - "8001:8000"
    profiles:
      - vllm
