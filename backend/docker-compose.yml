version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ../config:/app/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      RUN_MODE: ${RUN_MODE:-stub}
      VLLM_HOST: ${VLLM_HOST:-http://host.docker.internal}

  vllm-medgemma-4b:
    image: vllm/vllm-openai:latest
    command: ["--model", "google/medgemma-4b-it"]
    ports:
      - "8101:8000"
    profiles:
      - vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  vllm-medgemma-1-5-4b:
    image: vllm/vllm-openai:latest
    command: ["--model", "google/medgemma-1.5-4b-it"]
    ports:
      - "8102:8000"
    profiles:
      - vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  vllm-medgemma-27b:
    image: vllm/vllm-openai:latest
    command: ["--model", "google/medgemma-27b-it"]
    ports:
      - "8103:8000"
    profiles:
      - vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
