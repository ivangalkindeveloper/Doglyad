version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    profiles:
      - caddy
    depends_on:
      - backend

  backend:
    build: .
    ports:
      - "${BACKEND_PORT:-8000:8000}"
    volumes:
      - ./config:/app/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LLM_MODE: ${LLM_MODE:-stub}
      VLLM_HOST: ${VLLM_HOST:-http://host.docker.internal}

  vllm-medgemma-4b:
    image: vllm/vllm-openai:latest
    command: ["--model", "google/medgemma-4b-it"]
    ports:
      - "8101:8000"
    profiles:
      - vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  caddy_data:
  caddy_config:
